name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions: {}

jobs:
  # Fast syntax check — runs once on Linux before the matrix, catches parse
  # errors before spinning up 4 runners.
  syntax:
    name: Syntax check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
        env:
          HUSKY: '0'
      - name: Check TypeScript compiles (no emit)
        run: npx tsc --noEmit -p tsconfig.json
        env:
          HUSKY: '0'

  # Full test matrix — cross-platform, Node 22.
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: syntax
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
        env:
          HUSKY: '0'
      - run: npm test
