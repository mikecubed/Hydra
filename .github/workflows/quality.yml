name: Code Quality

on:
  push:
    branches: [main, dev, 'fix/**', 'feat/**', 'feature/**', 'track/**']
  pull_request:
    branches: [main, 'fix/**', 'feat/**', 'feature/**']
    types: [opened, synchronize, reopened]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      # ── On pull requests: only check changed JS/TS files ──────────────────
      - name: Get changed JS files (PR)
        id: changed-js
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.js
            **/*.mjs

      - name: Get changed TS files (PR)
        id: changed-ts
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.ts

      - name: Get changed format files (PR)
        id: changed-format
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.js
            **/*.mjs
            **/*.ts
            **/*.json
            **/*.md
            **/*.yml
            **/*.yaml

      - name: Get changed markdown files (PR)
        id: changed-markdown
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.md

      # ── ESLint on changed files (PR) ──────────────────────────────────────
      - name: ESLint (changed files)
        if: github.event_name == 'pull_request' && steps.changed-js.outputs.any_changed == 'true'
        run: |
          echo "Linting changed files:"
          echo "${{ steps.changed-js.outputs.all_changed_files }}"
          npx --no-install eslint --no-warn-ignored --max-warnings 0 -- ${{ steps.changed-js.outputs.all_changed_files }}

      # ── ESLint on changed TS files (PR) ───────────────────────────────────
      - name: ESLint (changed TS files)
        if: github.event_name == 'pull_request' && steps.changed-ts.outputs.any_changed == 'true'
        run: |
          echo "Linting changed TS files:"
          echo "${{ steps.changed-ts.outputs.all_changed_files }}"
          npx --no-install eslint --no-warn-ignored --max-warnings 0 -- ${{ steps.changed-ts.outputs.all_changed_files }}

      # ── ESLint on full codebase (push to main/dev) ─────────────────────────
      - name: ESLint (full)
        if: github.event_name == 'push'
        run: npm run lint

      # ── Prettier check on changed files (PR) ──────────────────────────────
      - name: Prettier (changed files)
        if: github.event_name == 'pull_request' && steps.changed-format.outputs.any_changed == 'true'
        run: |
          echo "Checking formatting of changed files:"
          echo "${{ steps.changed-format.outputs.all_changed_files }}"
          npx --no-install prettier --check -- ${{ steps.changed-format.outputs.all_changed_files }}

      # ── Prettier check on full codebase (push to main/dev) ────────────────
      - name: Prettier (full)
        if: github.event_name == 'push'
        run: npm run format:check

      # ── Mermaid lint on changed markdown (PR) ───────────────────────────────
      - name: Mermaid lint (changed markdown)
        if: github.event_name == 'pull_request' && steps.changed-markdown.outputs.any_changed == 'true'
        run: |
          echo "Validating Mermaid blocks in changed markdown files:"
          files_json='${{ steps.changed-markdown.outputs.all_changed_files_json }}'
          echo "$files_json" | jq -r '.[]' | while IFS= read -r file; do
            echo "$file"
            npm run lint:mermaid -- "$file"
          done

      # ── Mermaid lint on full markdown set (push to main/dev) ────────────────
      - name: Mermaid lint (full)
        if: github.event_name == 'push'
        run: npm run lint:mermaid

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: TypeScript check (lib + bin + scripts)
        run: npm run typecheck

  check-cycles:
    name: Circular Import Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Check for circular imports
        run: npm run lint:cycles

  check-coverage:
    name: Coverage Gate (78% / 79% funcs)
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          HUSKY: '0'

      - name: Check coverage thresholds
        run: npm run test:coverage:check
        env:
          HUSKY: '0'
        # Gate: 78% lines/statements, 76% branches, 79% functions — blocking.
        # Ultimate target: 80% (see docs/quality-evaluation.md roadmap).

      - name: Check per-file coverage floors
        run: npm run test:coverage:per-file

  audit:
    name: Dependency Audit (warn-only)
    runs-on: ubuntu-latest
    # Warn-only: new upstream advisories can land at any time and block unrelated PRs.
    # Flip to false only after establishing an allowlist/baseline process.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: npm audit (high+critical)
        run: npm audit --audit-level=high

  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  mutation-testing:
    name: Mutation Testing (${{ matrix.scope }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: false
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        scope: [shared, daemon]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      # On PRs: only mutate changed files within this matrix scope
      - name: Get changed mutation-scope files (PR)
        id: changed-mutate
        if: github.event_name == 'pull_request'
        run: |
          scope="${{ matrix.scope }}"
          if [ "$scope" = "shared" ]; then
            pattern='lib/hydra-shared/**/*.ts'
          else
            pattern='lib/daemon/**/*.ts'
          fi
          changed=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- \
            "$pattern" \
            | grep -v '\.test\.ts$' \
            | grep -v '\.d\.ts$' \
            | paste -sd ',' - || true)
          echo "files=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed $scope files: $changed"

      - name: Run mutation tests (changed files)
        if: github.event_name == 'pull_request' && steps.changed-mutate.outputs.files != ''
        run: npx stryker run stryker.${{ matrix.scope }}.config.json --mutate "${{ steps.changed-mutate.outputs.files }}"
        env:
          HUSKY: '0'

      - name: Skip mutation tests (no relevant changes)
        if: github.event_name == 'pull_request' && steps.changed-mutate.outputs.files == ''
        run: echo "No ${{ matrix.scope }} files changed — skipping."

      # On push to main only: run full scope for this matrix entry
      - name: Run mutation tests (full scope)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run test:mutation:${{ matrix.scope }}
        env:
          HUSKY: '0'

  new-file-policy:
    name: New File Test Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'
      - name: Check new files have tests
        run: npm run test:new-file-policy -- origin/${{ github.base_ref }}

  # ── Web Contracts Integrity ──────────────────────────────────────────────
  # Validates the shared @hydra/web-contracts schema package independently.
  # These schemas are the vocabulary shared between browser and gateway; a
  # regression here can silently break both surfaces.
  web-contracts-integrity:
    name: Web Contracts Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Validate web-contracts schemas
        run: npm --workspace @hydra/web-contracts run test

  # ── Web Responsiveness ─────────────────────────────────────────────────
  web-responsiveness:
    name: Web Responsiveness Budgets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      # ── Build and bundle-size evidence ────────────────────────────────────
      - name: Build web workspace
        id: web-build
        run: |
          set -o pipefail
          start_time=$(date +%s)
          npm --workspace @hydra/web run build 2>&1 | tee build-output.txt
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "elapsed=${elapsed}" >> "$GITHUB_OUTPUT"
          echo "Build completed in ${elapsed}s"

      - name: Check build time budget (≤ 30s)
        run: |
          elapsed=${{ steps.web-build.outputs.elapsed }}
          echo "Build time: ${elapsed}s (budget: 30s)"
          if [ "$elapsed" -gt 30 ]; then
            echo "::error::Build time ${elapsed}s exceeds 30s budget"
            exit 1
          fi

      - name: Check bundle size budgets
        run: |
          # Parse gzipped sizes from Vite build output.
          # Vite prints lines like: dist/assets/index-abc123.js  120.45 kB │ gzip: 38.12 kB
          js_total=0
          css_total=0
          while IFS= read -r line; do
            # Extract gzip size in kB from lines containing "gzip:"
            gzip_kb=$(echo "$line" | grep -oP 'gzip:\s*\K[\d.]+' || true)
            if [ -z "$gzip_kb" ]; then
              continue
            fi
            # Convert to integer bytes for comparison (multiply by 1000, truncate)
            gzip_bytes=$(echo "$gzip_kb" | awk '{printf "%d", $1 * 1024}')
            if echo "$line" | grep -qE '\.js(\s|$)'; then
              js_total=$((js_total + gzip_bytes))
            elif echo "$line" | grep -qE '\.css(\s|$)'; then
              css_total=$((css_total + gzip_bytes))
            fi
          done < build-output.txt

          js_kb=$((js_total / 1024))
          css_kb=$((css_total / 1024))
          echo "JS bundle (gzipped):  ${js_kb} KB (budget: 250 KB)"
          echo "CSS bundle (gzipped): ${css_kb} KB (budget: 50 KB)"

          failed=0
          if [ "$js_kb" -gt 250 ]; then
            echo "::error::JS bundle ${js_kb} KB exceeds 250 KB budget"
            failed=1
          fi
          if [ "$css_kb" -gt 50 ]; then
            echo "::error::CSS bundle ${css_kb} KB exceeds 50 KB budget"
            failed=1
          fi
          exit $failed

  # ── Quality Gate ───────────────────────────────────────────────────────
  # Aggregate summary for the always-on core quality jobs.  This is a
  # convenience signal, not a replacement for separately required PR-only or
  # policy checks such as mutation-testing and new-file-policy.
  quality-gate:
    name: Quality gate
    if: always()
    needs:
      - lint
      - typecheck
      - check-cycles
      - check-coverage
      - web-contracts-integrity
      - web-responsiveness
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate quality gates
        run: |
          echo "=== Quality Gate Summary ==="
          echo "Lint & Format:           ${{ needs.lint.result }}"
          echo "Type Check:              ${{ needs.typecheck.result }}"
          echo "Circular Import Check:   ${{ needs.check-cycles.result }}"
          echo "Coverage Gate:           ${{ needs.check-coverage.result }}"
          echo "Web Contracts Integrity: ${{ needs.web-contracts-integrity.result }}"
          echo "Web Responsiveness:      ${{ needs.web-responsiveness.result }}"
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.check-cycles.result }}" != "success" ]] || \
             [[ "${{ needs.check-coverage.result }}" != "success" ]] || \
             [[ "${{ needs.web-contracts-integrity.result }}" != "success" ]] || \
             [[ "${{ needs.web-responsiveness.result }}" != "success" ]]; then
            echo "::error::One or more quality gates failed"
            exit 1
          fi
          echo "All quality gates passed"
