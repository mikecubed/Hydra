name: Code Quality

on:
  push:
    branches: [main, dev, 'fix/**', 'feat/**', 'feature/**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      # ── On pull requests: only check changed .mjs files ───────────────────
      - name: Get changed JS files (PR)
        id: changed-js
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.mjs
            **/*.js

      - name: Get changed TS files (PR)
        id: changed-ts
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.ts

      - name: Get changed format files (PR)
        id: changed-format
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.mjs
            **/*.js
            **/*.ts
            **/*.json
            **/*.md
            **/*.yml
            **/*.yaml

      # ── ESLint on changed files (PR) ──────────────────────────────────────
      - name: ESLint (changed files)
        if: github.event_name == 'pull_request' && steps.changed-js.outputs.any_changed == 'true'
        run: |
          echo "Linting changed files:"
          echo "${{ steps.changed-js.outputs.all_changed_files }}"
          npx --no-install eslint -- ${{ steps.changed-js.outputs.all_changed_files }}

      # ── ESLint on changed TS files (PR) — informational until baseline is clean
      - name: ESLint (changed TS files)
        if: github.event_name == 'pull_request' && steps.changed-ts.outputs.any_changed == 'true'
        run: |
          echo "Linting changed TS files:"
          echo "${{ steps.changed-ts.outputs.all_changed_files }}"
          npx --no-install eslint -- ${{ steps.changed-ts.outputs.all_changed_files }}
        continue-on-error: true # TS lint baseline not yet clean; informational only

      # ── ESLint on full codebase (push to main/dev) ─────────────────────────
      # continue-on-error until codebase reaches a clean baseline (see docs/quality-fix-plan.md)
      - name: ESLint (full)
        if: github.event_name == 'push'
        run: npm run lint
        continue-on-error: true

      # ── Prettier check on changed files (PR) ──────────────────────────────
      - name: Prettier (changed files)
        if: github.event_name == 'pull_request' && steps.changed-format.outputs.any_changed == 'true'
        run: |
          echo "Checking formatting of changed files:"
          echo "${{ steps.changed-format.outputs.all_changed_files }}"
          npx --no-install prettier --check -- ${{ steps.changed-format.outputs.all_changed_files }}

      # ── Prettier check on full codebase (push to main/dev) ────────────────
      # continue-on-error until codebase reaches a clean baseline (see docs/quality-fix-plan.md)
      - name: Prettier (full)
        if: github.event_name == 'push'
        run: npm run format:check
        continue-on-error: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: TypeScript check (lib + bin + scripts)
        # tsc --noEmit processes the entire project defined in tsconfig.json.
        # Errors here are informational on PRs — strict enforcement is opt-in.
        run: npm run typecheck
        continue-on-error: true # type errors are reported but don't block PRs yet

  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
