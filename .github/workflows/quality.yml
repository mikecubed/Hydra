name: Code Quality

on:
  push:
    branches: [main, dev, 'fix/**', 'feat/**', 'feature/**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      # ── On pull requests: only check changed JS/TS files ──────────────────
      - name: Get changed JS files (PR)
        id: changed-js
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.js
            **/*.mjs

      - name: Get changed TS files (PR)
        id: changed-ts
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.ts

      - name: Get changed format files (PR)
        id: changed-format
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.js
            **/*.mjs
            **/*.ts
            **/*.json
            **/*.md
            **/*.yml
            **/*.yaml

      - name: Get changed markdown files (PR)
        id: changed-markdown
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.md

      # ── ESLint on changed files (PR) ──────────────────────────────────────
      - name: ESLint (changed files)
        if: github.event_name == 'pull_request' && steps.changed-js.outputs.any_changed == 'true'
        run: |
          echo "Linting changed files:"
          echo "${{ steps.changed-js.outputs.all_changed_files }}"
          npx --no-install eslint --no-warn-ignored --max-warnings 0 -- ${{ steps.changed-js.outputs.all_changed_files }}

      # ── ESLint on changed TS files (PR) ───────────────────────────────────
      - name: ESLint (changed TS files)
        if: github.event_name == 'pull_request' && steps.changed-ts.outputs.any_changed == 'true'
        run: |
          echo "Linting changed TS files:"
          echo "${{ steps.changed-ts.outputs.all_changed_files }}"
          npx --no-install eslint --no-warn-ignored --max-warnings 0 -- ${{ steps.changed-ts.outputs.all_changed_files }}

      # ── ESLint on full codebase (push to main/dev) ─────────────────────────
      - name: ESLint (full)
        if: github.event_name == 'push'
        run: npm run lint

      # ── Prettier check on changed files (PR) ──────────────────────────────
      - name: Prettier (changed files)
        if: github.event_name == 'pull_request' && steps.changed-format.outputs.any_changed == 'true'
        run: |
          echo "Checking formatting of changed files:"
          echo "${{ steps.changed-format.outputs.all_changed_files }}"
          npx --no-install prettier --check -- ${{ steps.changed-format.outputs.all_changed_files }}

      # ── Prettier check on full codebase (push to main/dev) ────────────────
      - name: Prettier (full)
        if: github.event_name == 'push'
        run: npm run format:check

      # ── Mermaid lint on changed markdown (PR) ───────────────────────────────
      - name: Mermaid lint (changed markdown)
        if: github.event_name == 'pull_request' && steps.changed-markdown.outputs.any_changed == 'true'
        run: |
          echo "Validating Mermaid blocks in changed markdown files:"
          files_json='${{ steps.changed-markdown.outputs.all_changed_files_json }}'
          echo "$files_json" | jq -r '.[]' | while IFS= read -r file; do
            echo "$file"
            npm run lint:mermaid -- "$file"
          done

      # ── Mermaid lint on full markdown set (push to main/dev) ────────────────
      - name: Mermaid lint (full)
        if: github.event_name == 'push'
        run: npm run lint:mermaid

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: TypeScript check (lib + bin + scripts)
        run: npm run typecheck

  check-cycles:
    name: Circular Import Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Check for circular imports
        run: npm run lint:cycles

  check-coverage:
    name: Coverage Gate (78% / 79% funcs)
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          HUSKY: '0'

      - name: Check coverage thresholds
        run: npm run test:coverage:check
        env:
          HUSKY: '0'
        # Gate: 78% lines/statements, 76% branches, 79% functions — blocking.
        # Ultimate target: 80% (see docs/quality-evaluation.md roadmap).

      - name: Check per-file coverage floors
        run: npm run test:coverage:per-file

  audit:
    name: Dependency Audit (warn-only)
    runs-on: ubuntu-latest
    # Warn-only: new upstream advisories can land at any time and block unrelated PRs.
    # Flip to false only after establishing an allowlist/baseline process.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      - name: npm audit (high+critical)
        run: npm audit --audit-level=high

  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'

      # On PRs: only mutate changed files within the mutation scope
      - name: Get changed mutation-scope files (PR)
        id: changed-mutate
        if: github.event_name == 'pull_request'
        run: |
          changed=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- \
            'lib/hydra-shared/**/*.ts' 'lib/daemon/**/*.ts' \
            | grep -v '\.test\.ts$' \
            | grep -v '\.d\.ts$' \
            | paste -sd ',' - || true)
          echo "files=$changed" >> "$GITHUB_OUTPUT"
          echo "Changed mutation-scope files: $changed"

      - name: Run mutation tests (changed files)
        if: github.event_name == 'pull_request' && steps.changed-mutate.outputs.files != ''
        run: npx stryker run --mutate "${{ steps.changed-mutate.outputs.files }}"
        env:
          HUSKY: '0'

      - name: Skip mutation tests (no relevant changes)
        if: github.event_name == 'pull_request' && steps.changed-mutate.outputs.files == ''
        run: echo "No mutation-scope files changed — skipping."

      # On push to main/dev: run full mutation suite
      - name: Run mutation tests (full)
        if: github.event_name == 'push'
        run: npm run test:mutation
        env:
          HUSKY: '0'

  new-file-policy:
    name: New File Test Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: '0'
      - name: Check new files have tests
        run: npm run test:new-file-policy -- origin/${{ github.base_ref }}
